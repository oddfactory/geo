    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',

                    fontFamily: {

    <style type="text/tailwindcss">

            .glassmorphism {
                @apply bg-glass backdrop-blur-xl border border-glassBorder rounded-2xl shadow-2xl;
            }
            .neon-ai {
                box-shadow: 0 0 30px rgba(56, 189, 248, 0.15), 0 0 60px rgba(167, 139, 250, 0.1);
                border-color: rgba(167, 139, 250, 0.4) !important;
                transition: all 0.5s ease;
            }
        }
        body {
            @apply bg-[#0f1115] text-gray-100 flex items-center justify-center min-h-screen m-0;
            background-image: radial-gradient(circle at 30% 0%, rgba(56, 189, 248, 0.05) 0%, transparent 50%), 
                              radial-gradient(circle at 70% 100%, rgba(167, 139, 250, 0.05) 0%, transparent 50%);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        textarea { outline: none; }
    </style>
    <!-- Chart.js & html2canvas & jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="w-[1280px] h-[860px] flex gap-6 p-6">
        
        <!-- Left Panel: Input Area -->
        <div class="flex-[1.1] glassmorphism flex flex-col p-8 bg-[#15181e]/80">
            <div class="mb-6">
                <h1 class="text-[32px] font-extrabold text-white tracking-tight mb-2 flex items-center gap-2">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400">GEO</span> 
                    콘텐츠 분석기
                </h1>
                <p class="text-gray-400 text-[15px] leading-relaxed">
                    작성 중인 문서가 생성형 AI 검색 엔진(ChatGPT, Claude 등)에 인용될 가능성을<br>
                    실시간으로 진단하고 최적화 솔루션을 제안합니다.
                </p>
            </div>
            
            <div class="relative flex-1 flex flex-col gap-4">
                <textarea id="inputBox" class="w-full flex-1 bg-black/30 text-gray-100 rounded-xl p-6 resize-none focus:ring-1 focus:ring-sky-500/50 border border-white/5 text-[17px] leading-[1.8] placeholder-gray-600 font-light" placeholder="여기에 상품 소개, 광고 카피, 블로그 본문을 입력하거나 붙여넣으세요.&#10;분석하기 버튼을 누르면 설정된 모드에 따라 평가를 진행합니다."></textarea>
                
                <!-- Controls: AI Toggle and Button -->
                <div class="flex items-center justify-between bg-black/20 p-4 rounded-xl border border-white/5">
                    <label class="flex items-center cursor-pointer gap-3">
                        <div class="relative">

                    <button id="analyzeBtn" class="px-6 py-2.5 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-lg transition-all shadow-lg shadow-sky-500/20 flex items-center gap-2">

                    <button class="px-3 py-1.5 bg-white/5 backdrop-blur-sm rounded-lg border border-white/10 hover:bg-white/10 test-btn text-xs text-gray-400 transition" data-type="good">우수 샘플</button>

            <!-- Header -->

            <div class="shrink-0 pb-4 flex flex-col flex-1">

                    항목별 개선 제안

                <!-- Export Action Buttons -->
                <div class="flex gap-3 pt-4 border-t border-white/10 mt-auto">
                    <button id="savePngBtn" class="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[13px] font-bold transition flex items-center justify-center gap-2 border border-white/10 text-gray-300 hover:text-white group">
                        <svg class="text-sky-400 group-hover:scale-110 transition-transform" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        PNG 저장
                    </button>
                    <button id="savePdfBtn" class="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[13px] font-bold transition flex items-center justify-center gap-2 border border-white/10 text-gray-300 hover:text-white group">
                        <svg class="text-indigo-400 group-hover:scale-110 transition-transform" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        PDF 리포트

                    <button id="saveJsonBtn" class="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[13px] font-bold transition flex items-center justify-center gap-2 border border-white/10 text-gray-300 hover:text-white group">
                        <svg class="text-orange-400 group-hover:scale-110 transition-transform" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>

        </div>

    <!-- Hidden PDF Report Template -->
    <div id="pdfTemplate" class="absolute top-[-9999px] left-[-9999px] w-[800px] bg-white text-gray-900 p-10 hidden">
        <div class="border-b-2 border-gray-900 pb-6 mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-gray-900 mb-2">GEO 분석 결과 보고서</h1>
                <p class="text-gray-500 font-medium" id="pdfDate">2026-04-24</p>
            </div>
            <div class="text-right">
                <div class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">Total Score</div>
                <div class="text-5xl font-black text-sky-600 leading-none" id="pdfTotalScore">0</div>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-l-4 border-sky-500 pl-3">원본 텍스트</h2>
            <div class="bg-gray-50 p-6 rounded-lg text-[15px] leading-relaxed text-gray-700 whitespace-pre-wrap break-words border border-gray-200" id="pdfOriginalText"></div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-l-4 border-indigo-500 pl-3">지표별 점수</h2>
            <div class="grid grid-cols-2 gap-4" id="pdfScoreBars">
                <!-- Bars injected via JS -->
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-l-4 border-purple-500 pl-3">AI 최적화 가이드</h2>
            <div class="bg-purple-50 p-6 rounded-lg text-[15px] leading-relaxed text-gray-800 border border-purple-100" id="pdfAdviceText"></div>
        </div>
    </div>

    <script>
        // Data Dictionaries
        const DICTS = {
            authority: ["대학", "연구소", "통계청", "한국은행", "McKinsey", "Gartner", "정부", "위원회", "논문", "저널", "포브스", "가트너", "맥킨지", "KOSIS", "식약처", "WHO", "통계", "리서치"],
            citationPhrases: ["에 따르면", "의 조사", "연구에서", "밝혔다", "보고서에", "발표한", "설문 결과", "조사 결과", "통계에 의하면"],
            jargon: [
                "B2B", "B2C", "ROI", "KPI", "SEO", "GEO", "LLM", "RAG", "CTR", "전환율", "이탈률", "MAU", "DAU", 
                "클라우드", "온프레미스", "SaaS", "PaaS", "IaaS", "API", "SDK", "프레임워크", "알고리즘", "인사이트",
                "페르소나", "시너지", "레버리지", "어질리티", "옴니채널", "퍼포먼스", "리텐션", "LTV", "CAC", "퍼널", "트래픽"
            ],
            casualWords: ["너무", "정말", "대박", "완전", "진짜", "엄청", "짱", "미친", "개좋", "헐", "ㅠㅠ", "ㅋㅋ"],
            authorCredit: ["필자", "본 글에서는", "저자는", "본 문서", "작성자", "본 보고서"]
        };

        // Chart Instances
        let radarInstance = null;
        let barInstance = null;

        // Colors
        Chart.defaults.color = '#6b7280';
        Chart.defaults.font.family = "'Pretendard', sans-serif";

        function getColorObj(score) {
            if (score >= 70) return { text: 'text-sky-400', border: 'border-sky-400/20', bg: 'bg-sky-400/10', hex: '#38bdf8' }; // Sky-blue
            if (score >= 40) return { text: 'text-orange-400', border: 'border-orange-400/20', bg: 'bg-orange-400/10', hex: '#fb923c' }; // Orange
            return { text: 'text-rose-500', border: 'border-rose-500/20', bg: 'bg-rose-500/10', hex: '#f43f5e' }; // Rose-red
        }

        function initCharts() {
            const radarCtx = document.getElementById('radarChart').getContext('2d');
            radarInstance = new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['통계', '인용', '구조', '전문성'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: 'rgba(107, 114, 128, 0.2)',
                        borderColor: '#6b7280',
                        borderWidth: 2,
                        pointBackgroundColor: '#6b7280',
                        pointBorderColor: '#13151a',
                        pointRadius: 4,
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0, max: 100,
                            ticks: { display: false, stepSize: 25 },
                            grid: { color: 'rgba(255, 255, 255, 0.05)', circular: true },
                            angleLines: { color: 'rgba(255, 255, 255, 0.05)' },
                            pointLabels: { font: { size: 13, weight: '600' }, color: '#9ca3af' }
                        }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    maintainAspectRatio: false
                }
            });

            const barCtx = document.getElementById('barChart').getContext('2d');
            barInstance = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['통계', '인용', '구조', '전문성'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: '#6b7280',
                        borderRadius: 6,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    scales: {
                        y: { min: 0, max: 100, grid: { color: 'rgba(255, 255, 255, 0.05)' }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 12 } } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    maintainAspectRatio: false
                }
            });
        }

        // Scoring Engine
        function analyzeText(text) {
            const length = text.length;
            
            // 1. 통계 (Statistics)
            const statRegex = [
                /\d+(?:\.\d+)?\s*%/g,
                /(?:\$|₩|￦|€)?\d{1,3}(?:,\d{3})+(?:원|달러|불)?/g,
                /(?:19|20)\d{2}\s*년?/g,
                /\d+(?:\.\d+)?\s*배/g,
                /\d+\s*(명|건|회|개|위|점)/g
            ];

            let statCount = 0;
            statRegex.forEach(regex => {
                const matches = text.match(regex) || [];
                statCount += matches.length;
            });
            const rawStat = (statCount / (length || 1)) * 100;
            const statScore = Math.min(100, (rawStat / 3) * 100);

            // 2. 인용 (Citations)
            let citScore = 0;
            const urls = text.match(/https?:\/\/[^\s]+/g) || [];
            citScore += urls.length * 15;

            DICTS.citationPhrases.forEach(phrase => {
                citScore += (text.split(phrase).length - 1) * 12;
            });
            DICTS.authority.forEach(keyword => {
                citScore += (text.split(keyword).length - 1) * 8;
            });
            const yearSource = text.match(/\d{4}년.*?(발표|보고|조사)/g) || [];
            citScore += yearSource.length * 10;
            citScore = Math.min(100, citScore);

            // 3. 구조 (Structure)
            let strScore = 0;
            strScore += (text.match(/^#{1,3}\s+/gm) || []).length * 10;
            strScore += Math.min(30, (text.match(/^[-*•]\s+/gm) || []).length * 5);
            strScore += Math.min(20, (text.match(/^\d+\.\s+/gm) || []).length * 5);
            if (/(FAQ|자주 묻는 질문|Q:|A:)/i.test(text)) strScore += 15;
            if (/(TL;DR|요약|핵심 정리)/i.test(text)) strScore += 15;

            const paragraphs = text.split(/\n+/).filter(p => p.trim().length > 0);
            if (paragraphs.length > 1) {
                const lengths = paragraphs.map(p => p.length);
                const avgLen = lengths.reduce((a, b) => a + b, 0) / lengths.length;
                const variance = lengths.reduce((a, b) => a + Math.pow(b - avgLen, 2), 0) / lengths.length;
                if (Math.sqrt(variance) < 100) strScore += 10;
            }
            strScore = Math.min(100, strScore);

            // 4. 전문성 (Expertise)
            let expScore = 50; // Baseline
            DICTS.jargon.forEach(word => {
                expScore += (text.split(word).length - 1) * 3;
            });
            DICTS.casualWords.forEach(word => {
                expScore -= (text.split(word).length - 1) * 4;
            });
            let creditCount = 0;
            DICTS.authorCredit.forEach(word => {
                creditCount += (text.split(word).length - 1);
            });
            if (creditCount > 0) expScore += 10;

            const sentences = text.split(/[.?!]\s/).filter(s => s.trim().length > 0);
            if (sentences.length > 0) {
                const avgSentLen = sentences.reduce((a, b) => a + b.length, 0) / sentences.length;
                if (avgSentLen >= 30 && avgSentLen <= 60) expScore += 20;
            }

            const firstPersonCount = (text.match(/제가|저는|나의|내가|나는/g) || []).length;
            if (firstPersonCount > 3) expScore -= (firstPersonCount - 3) * 2;
            expScore = Math.max(0, Math.min(100, expScore));

            const totalScore = Math.round((statScore + citScore + strScore + expScore) / 4);

            return {
                scores: [Math.round(statScore), Math.round(citScore), Math.round(strScore), Math.round(expScore)],
                total: totalScore
            };
        }

        // Global state for exports
        let currentReportData = { timestamp: "", original_text: "", scores: null, total: 0, ai_advice: "" };

        // Render UI
        function updateUI(results, isAI = false, advice = "") {
            const emptyState = document.getElementById('emptyState');
            const scoreEl = document.getElementById('totalScore');
            const sugContainer = document.getElementById('suggestions');
            const inputBox = document.getElementById('inputBox');

            if (!results) {
                emptyState.style.opacity = '1';
                emptyState.style.pointerEvents = 'auto';
                currentReportData.scores = null;
                return;
            }

            // Save global state
            currentReportData = {
                timestamp: new Date().toLocaleString('ko-KR'),
                original_text: inputBox.value,
                scores: results.scores,
                total: results.total,
                ai_advice: advice
            };

            emptyState.style.opacity = '0';
            emptyState.style.pointerEvents = 'none';

            const { scores, total } = results;
            const mainColor = getColorObj(total);

            // Update Total Score Number & Color
            scoreEl.textContent = total;
            scoreEl.className = `text-[84px] leading-none font-black transition-colors duration-500 ${mainColor.text}`;

            // Update Charts
            radarInstance.data.datasets[0].data = scores;
            radarInstance.data.datasets[0].borderColor = mainColor.hex;
            radarInstance.data.datasets[0].backgroundColor = mainColor.hex + '25';
            radarInstance.data.datasets[0].pointBackgroundColor = mainColor.hex;
            radarInstance.update();

            // Setup bar colors per axis based on its own score
            const barColors = scores.map(s => getColorObj(s).hex);
            barInstance.data.datasets[0].data = scores;
            barInstance.data.datasets[0].backgroundColor = barColors;
            barInstance.update();

            // Update Suggestions
            const labels = ['통계 (Statistics)', '인용 (Citations)', '구조 (Structure)', '전문성 (Expertise)'];
            sugContainer.innerHTML = '';
            
            if (isAI && advice) {
                const div = document.createElement('div');
                div.className = `p-5 rounded-xl bg-gradient-to-br from-indigo-500/10 to-purple-500/10 border border-indigo-500/30 text-[14.5px] text-gray-200 leading-relaxed shadow-inner`;
                div.innerHTML = `<div class="font-bold text-indigo-400 mb-2.5 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> AI 종합 피드백 (Gemini)</div>
                <p>${advice.replace(/\n/g, '<br>')}</p>`;
                sugContainer.appendChild(div);
            } else {
                scores.forEach((score, idx) => {
                    const c = getColorObj(score);
                    let text = '';
                    if (idx === 0) {
                        text = score < 40 ? "수치나 데이터가 부족합니다. 퍼센트(%), 금액, 연도 등을 추가해 주장을 뒷받침하세요." :
                               score < 70 ? "통계 자료가 일부 포함되어 있습니다. 구체적인 수치를 더 추가하면 신뢰도가 높아집니다." :
                               "충분한 통계 데이터가 포함되어 있어 주장의 근거가 탄탄합니다.";
                    } else if (idx === 1) {
                        text = score < 40 ? "URL이나 출처 표기가 없습니다. 신뢰할 만한 기관명이나 링크를 1개 이상 추가해 보세요." :
                               score < 70 ? "일부 인용이 포함되어 있습니다. '~에 따르면'과 같은 출처 언급을 늘리면 좋습니다." :
                               "명확한 출처와 인용이 포함되어 AI가 신뢰도 높은 정보로 인식하기 좋습니다.";
                    } else if (idx === 2) {
                        text = score < 40 ? "글의 구조가 단조롭습니다. 헤딩(#)이나 리스트를 사용해 가독성을 높이세요." :
                               score < 70 ? "기본적인 구조를 갖췄습니다. 요약 섹션이나 FAQ를 추가하면 발췌되기 더 쉬워집니다." :
                               "헤딩과 리스트가 적절히 사용되어 구조가 명확하고 기계가 읽기 매우 좋습니다.";
                    } else {
                        text = score < 40 ? "전문성이 부족해 보일 수 있습니다. 감탄사를 줄이고 도메인 전문 용어를 활용해 보세요." :
                               score < 70 ? "무난한 어투입니다. 전문 용어를 조금 더 활용하거나 문장 길이를 균형 있게 조절해 보세요." :
                               "전문 용어가 잘 포함되었고 객관적인 어투를 유지하여 E-E-A-T 관점에서 유리합니다.";
                    }

                    const div = document.createElement('div');
                    div.className = `p-4 rounded-xl bg-[#0f1115]/50 border ${c.border} text-[14px] text-gray-300 flex flex-col gap-1.5 transition-all`;
                    div.innerHTML = `<div class="font-bold tracking-wide text-[13px] ${c.text} flex justify-between items-center">
                        <span>${labels[idx]}</span>
                        <span class="bg-black/30 px-2 py-0.5 rounded-md">${score}점</span>
                    </div>
                    <p class="leading-relaxed opacity-90">${text}</p>`;
                    sugContainer.appendChild(div);
                });
            }
        }

        // Gemini API Configuration
        const GEMINI_API_KEY = 'AIzaSyCDihGR3oTRoFvqNSuiKegxJogJOIiNw0g';
        const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${GEMINI_API_KEY}`;

        async function fetchGeminiAnalysis(text) {
            const prompt = `당신은 GEO 전문가입니다. 입력된 텍스트를 [통계, 인용, 구조, 전문성] 4개 지표로 분석하여 각각 0~100점 사이로 채점하고, 종합 조언(advice)을 포함해 반드시 JSON 형식 { "stat": 0, "cite": 0, "struct": 0, "prof": 0, "advice": "" }으로만 응답하세요.\n\n분석할 텍스트:\n${text}`;
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s timeout

            try {
                const response = await fetch(GEMINI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    console.error('API Error Response:', errorData);
                    // Fallback to latest flash if 1.5-flash-latest also fails (API version changes over time)
                    if (response.status === 404) {
                        throw new Error('MODEL_NOT_FOUND');
                    }
                    throw new Error('API request failed');
                }
                const data = await response.json();
                let resultText = data.candidates[0].content.parts[0].text;
                
                // Clean up Markdown JSON formatting if present
                resultText = resultText.replace(/```json\s*/, '').replace(/```\s*$/, '').trim();
                return JSON.parse(resultText);
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();

            const inputBox = document.getElementById('inputBox');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const aiToggle = document.getElementById('aiToggle');
            const toggleBg = document.getElementById('toggleBg');
            const toggleDot = document.getElementById('toggleDot');
            const aiLabel = document.getElementById('aiLabel');
            const resultPanel = document.getElementById('resultPanel');

            // Toggle AI Mode UI
            aiToggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    toggleBg.classList.replace('bg-gray-700', 'bg-indigo-500');
                    toggleDot.classList.add('translate-x-5');
                    aiLabel.textContent = 'AI 정밀 분석 활성화됨';
                    aiLabel.classList.replace('text-gray-300', 'text-indigo-400');
                    resultPanel.classList.add('neon-ai');
                } else {
                    toggleBg.classList.replace('bg-indigo-500', 'bg-gray-700');
                    toggleDot.classList.remove('translate-x-5');
                    aiLabel.textContent = 'AI 정밀 분석 비활성화';
                    aiLabel.classList.replace('text-indigo-400', 'text-gray-300');
                    resultPanel.classList.remove('neon-ai');
                }
            });

            // Analyze Button Logic
            analyzeBtn.addEventListener('click', async () => {
                const text = inputBox.value;
                if (text.trim() === '') {
                    updateUI(null);
                    return;
                }

                if (aiToggle.checked) {
                    // AI Mode
                    analyzeBtn.disabled = true;
                    analyzeBtn.classList.add('opacity-70', 'cursor-not-allowed');
                    const spinnerHtml = '<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                    btnText.innerHTML = `${spinnerHtml} AI가 문맥을 읽는 중...`;

                    let delayMessageTimeout = setTimeout(() => {
                        btnText.innerHTML = `${spinnerHtml} 응답이 늦어지고 있습니다, 잠시만 기다려주세요...`;
                    }, 10000); // 10s delay message

                    try {
                        const jsonResult = await fetchGeminiAnalysis(text);
                        clearTimeout(delayMessageTimeout);
                        
                        const scores = [jsonResult.stat, jsonResult.cite, jsonResult.struct, jsonResult.prof];
                        const totalScore = Math.round(scores.reduce((a, b) => a + b, 0) / 4);
                        
                        updateUI({ scores, total: totalScore }, true, jsonResult.advice);
                    } catch (error) {
                        clearTimeout(delayMessageTimeout);
                        console.error(error);
                        if (error.name === 'AbortError') {
                            alert("API 응답 시간이 초과되었습니다 (60초). 다시 시도해 주세요.");
                        } else {
                            alert("AI 분석 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
                        }
                    } finally {
                        analyzeBtn.disabled = false;
                        analyzeBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                        btnText.textContent = '분석 실행하기';
                    }
                } else {
                    // Rule-based Mode
                    const results = analyzeText(text);
                    updateUI(results, false);
                }
            });

            // Test Buttons
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const type = e.target.dataset.type;
                    if (type === 'good') {
                        inputBox.value = "본 보고서는 2024년 글로벌 클라우드 시장 동향을 분석한다. Gartner의 조사 결과에 따르면, B2B SaaS 시장은 전년 대비 42% 성장하여 1,500억 달러 규모에 도달했다. 이는 AI와 LLM 기술의 적극적인 도입이 ROI를 3.5배 이상 끌어올린 결과로 분석된다. \n\n## 주요 통계\n- 클라우드 전환율: 65%\n- 평균 비용 절감: 20%\n\n필자는 이러한 트렌드가 향후 5년간 지속될 것으로 전망한다. 자세한 내용은 https://example.com 에서 확인할 수 있다.";
                    } else if (type === 'bad') {
                        inputBox.value = "오늘 새로 나온 화장품 써봤는데 진짜 완전 대박이에요 ㅠㅠ 너무 촉촉하고 짱 좋음!!! 제가 원래 피부가 예민한 편인데 이건 미친 듯이 순해요. 가격도 착하고 완전 강추합니다! 다들 꼭 사보세요 제발요 ㅠㅠ ㅋㅋ";
                    } else if (type === 'structure') {
                        inputBox.value = "## SEO 최적화 가이드\n\n이 문서는 SEO 최적화를 위한 핵심 원칙을 설명합니다.\n\n### TL;DR (요약)\n검색 엔진 단조롭습니다. 헤딩(#)이나 리스트를 사용해 가독성을 높이세요.\n\n### 주요 체크리스트\n1. 메타 태그 작성\n2. 키워드 밀도 유지\n3. 모바일 친화성 확보\n\n### FAQ\nQ: 얼마나 자주 업데이트해야 하나요?\nA: 최소 주 1회 권장합니다.\n\n이러한 원칙을 지키면 검색 결과에서 더 높은 순위를 기대할 수 있습니다.";
                    }
                });
            });

            // Export Handlers
            const savePngBtn = document.getElementById('savePngBtn');
            const savePdfBtn = document.getElementById('savePdfBtn');
            const saveJsonBtn = document.getElementById('saveJsonBtn');
            
            function setBtnLoading(btn, isLoading, originalText) {
                if (isLoading) {
                    btn.dataset.original = originalText;
                    btn.disabled = true;
                    btn.innerHTML = `<svg class="animate-spin h-4 w-4 mr-2 text-current inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 파일 생성 중...`;
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.disabled = false;
                    btn.innerHTML = btn.dataset.original;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }

            savePngBtn.addEventListener('click', () => {
                if (!currentReportData.scores) return alert('분석 결과가 없습니다.');
                const originalHtml = savePngBtn.innerHTML;
                setBtnLoading(savePngBtn, true, originalHtml);
                
                const panel = document.getElementById('resultPanel');
                const origOverflow = panel.style.overflowY;
                panel.style.overflowY = 'visible';
                
                html2canvas(panel, {
                    backgroundColor: '#13151a',
                    scale: 2,
                    windowHeight: panel.scrollHeight
                }).then(canvas => {
                    panel.style.overflowY = origOverflow;
                    const link = document.createElement('a');
                    link.download = `geo-analyzer-${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 15)}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    setBtnLoading(savePngBtn, false);
                });
            });

            savePdfBtn.addEventListener('click', async () => {
                if (!currentReportData.scores) return alert('분석 결과가 없습니다.');
                const originalHtml = savePdfBtn.innerHTML;
                setBtnLoading(savePdfBtn, true, originalHtml);
                
                try {
                    // Populate Template
                    document.getElementById('pdfDate').textContent = currentReportData.timestamp;
                    document.getElementById('pdfTotalScore').textContent = currentReportData.total;
                    document.getElementById('pdfOriginalText').textContent = currentReportData.original_text || "입력된 텍스트가 없습니다.";
                    document.getElementById('pdfAdviceText').innerHTML = currentReportData.ai_advice ? currentReportData.ai_advice.replace(/\n/g, '<br>') : '상세 AI 분석 가이드는 AI 정밀 분석 모드에서 제공됩니다.';
                    
                    const labels = ['통계 (Statistics)', '인용 (Citations)', '구조 (Structure)', '전문성 (Expertise)'];
                    const colors = ['bg-sky-500', 'bg-orange-500', 'bg-rose-500', 'bg-indigo-500'];
                    const scoreHtml = currentReportData.scores.map((score, idx) => `
                        <div class="bg-white p-4 rounded-lg border border-gray-200">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-gray-700 text-sm">${labels[idx]}</span>
                                <span class="font-black text-gray-900">${score}점</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2.5">
                                <div class="${colors[idx]} h-2.5 rounded-full" style="width: ${score}%"></div>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('pdfScoreBars').innerHTML = scoreHtml;

                    const template = document.getElementById('pdfTemplate');
                    template.style.display = 'block';

                    const canvas = await html2canvas(template, { scale: 2, backgroundColor: '#ffffff' });
                    template.style.display = 'none';

                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`geo-report-${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 15)}.pdf`);
                } catch (e) {
                    console.error(e);
                    alert("PDF 생성 중 오류가 발생했습니다.");
                } finally {
                    setBtnLoading(savePdfBtn, false);
                }
            });

            saveJsonBtn.addEventListener('click', () => {
                if (!currentReportData.scores) return alert('분석 결과가 없습니다.');
                const originalHtml = saveJsonBtn.innerHTML;
                setBtnLoading(saveJsonBtn, true, originalHtml);
                
                setTimeout(() => {
                    const jsonStr = JSON.stringify(currentReportData, null, 2);
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `geo-data-${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 15)}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    setBtnLoading(saveJsonBtn, false);
                }, 500); // Small delay for UX loading effect
            });
        });
    </script>
